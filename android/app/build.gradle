plugins {
    id "com.android.application" version "8.1.0"
    id "org.jetbrains.kotlin.android" version "1.8.22"
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0"
}

android {
    // Definición de Namespace según estándares recientes de AGP
    namespace "com.safeguard.mobile"
    compileSdk 34

    defaultConfig {
        applicationId "com.safeguard.mobile"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            // Firma de debug para bypass de Keystore ausente en este build
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
}
